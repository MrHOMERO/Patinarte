name: Procesar Video Patinarte

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Configurar Python en el servidor
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar herramientas de video
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        pip install moviepy

    - name: Ejecutar edicion automatica
      run: |
        python -c '
        import os
        from moviepy.editor import VideoFileClip, ImageClip, concatenate_videoclips

        video_original = "Video_2026_07_14_22_37_06.mp4"
        img1_path = "carrete1.jpg.jpg"
        img2_path = "carrete2.jpg.jpg"

        duracion_foto = 1.5 

        # Cargamos el video original para saber su tamaño exacto (ancho y alto)
        video = VideoFileClip(video_original)
        ancho, alto = video.size

        # Cargamos las imágenes y las forzamos a tener el tamaño del video original
        # Esto evita que el editor falle por diferencia de formatos
        img1 = ImageClip(img1_path).set_duration(duracion_foto).resize(newsize=(ancho, alto))
        img2 = ImageClip(img2_path).set_duration(duracion_foto).resize(newsize=(ancho, alto))

        # Dividimos el video en segmentos de 5 segundos
        clip_v1 = video.subclip(0, 5)
        clip_v2 = video.subclip(5, 10)
        clip_v3 = video.subclip(10, 15)
        clip_v4 = video.subclip(15, 22)

        # Intercalamos el video con tus fotos
        secuencia = [
            clip_v1, img1, img2,
            clip_v2, img1, img2,
            clip_v3, img1, img2,
            clip_v4
        ]

        # Combinamos todo en un único video
        video_final = concatenate_videoclips(secuencia, method="compose")
        video_final.write_videofile("resultado_final.mp4", fps=video.fps, codec="libx264", audio_codec="aac")
        '

    - name: Guardar video final
      uses: actions/upload-artifact@v4
      with:
        name: video-patinarte-final
        path: resultado_final.mp4
